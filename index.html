<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff6b9d">
<title>にほんご かいわ れんしゅう</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Sans','Meiryo','Noto Sans JP',sans-serif;background:linear-gradient(135deg,#fce4ec,#e8eaf6);min-height:100vh;color:#333;overflow-x:hidden}

/* Header */
.header{background:linear-gradient(135deg,#ff6b9d,#c084fc);color:#fff;padding:12px 16px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.header h1{font-size:18px;letter-spacing:1px}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.lesson-select{background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.5);border-radius:20px;color:#fff;padding:6px 14px;font-size:14px;font-weight:bold;cursor:pointer;-webkit-appearance:none}
.lesson-select option{color:#333;background:#fff}
.btn-voice{background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.5);border-radius:20px;color:#fff;padding:6px 10px;font-size:12px;cursor:pointer;-webkit-appearance:none}
.btn-voice option{color:#333;background:#fff}

/* Character */
.character-area{display:flex;flex-direction:column;align-items:center;padding:30px 0 10px}
.face{width:150px;height:150px;background:linear-gradient(135deg,#ffe0b2,#ffcc80);border-radius:50%;position:relative;box-shadow:0 8px 25px rgba(0,0,0,.15);border:4px solid #fff}
.eye{position:absolute;width:20px;height:24px;background:#333;border-radius:50%;top:50px}
.eye-left{left:38px}
.eye-right{right:38px}
.eye-shine{position:absolute;width:7px;height:7px;background:#fff;border-radius:50%;top:4px;left:3px}
.eye.blink{animation:blink 0.15s ease-in-out}
@keyframes blink{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.05)}}

/* Mouth states */
.mouth{position:absolute;bottom:35px;left:50%;transform:translateX(-50%);width:30px;height:15px;background:#e57373;border-radius:0 0 15px 15px;transition:all .1s}
.mouth.smile{width:35px;height:10px;background:transparent;border-bottom:3px solid #e57373;border-radius:0 0 20px 20px;bottom:38px}
.mouth.speaking{animation:speak .25s infinite alternate}
@keyframes speak{0%{height:8px;width:22px;border-radius:50%}100%{height:20px;width:28px;border-radius:50%}}
.mouth.thinking{width:12px;height:12px;border-radius:50%;bottom:38px;background:#e57373}

/* Blush */
.blush{position:absolute;width:22px;height:14px;background:rgba(255,138,128,.4);border-radius:50%;top:72px}
.blush-left{left:22px}
.blush-right{right:22px}

/* Thinking eyes animation */
.eye.thinking{animation:lookAround 1.5s infinite}
@keyframes lookAround{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}

/* Listening sparkle */
.eye.listening .eye-shine{animation:sparkle .8s infinite}
@keyframes sparkle{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:.6}}

/* Status text */
.status-text{margin-top:12px;font-size:13px;color:#999;min-height:20px}

/* Speech bubble */
.bubble-area{padding:10px 20px;min-height:80px;display:flex;flex-direction:column;gap:10px}
.bubble{max-width:85%;padding:12px 16px;border-radius:18px;font-size:15px;line-height:1.7;animation:fadeUp .3s ease;word-break:break-word}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.bubble.ai{background:#fff;color:#333;align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.bubble.user{background:linear-gradient(135deg,#7c4dff,#536dfe);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}

/* Mic button area */
.mic-area{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(transparent,rgba(252,228,236,.95) 30%)}
.mic-row{display:flex;justify-content:center;align-items:center;gap:16px}
.text-row{display:flex;gap:8px;margin-top:8px}
.text-row input{flex:1;padding:10px 14px;border:2px solid #e0e0e0;border-radius:24px;font-size:15px;outline:none}
.text-row input:focus{border-color:#c084fc}
.text-row button{background:linear-gradient(135deg,#ff6b9d,#c084fc);color:#fff;border:none;border-radius:24px;padding:10px 16px;font-size:14px;cursor:pointer;white-space:nowrap}
.btn-mic{width:72px;height:72px;border-radius:50%;border:none;background:linear-gradient(135deg,#ff6b9d,#c084fc);color:#fff;font-size:30px;cursor:pointer;box-shadow:0 4px 15px rgba(255,107,157,.4);transition:all .2s;display:flex;align-items:center;justify-content:center}
.btn-mic:active{transform:scale(.92)}
.btn-mic.recording{background:linear-gradient(135deg,#ef5350,#f44336);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(244,67,54,.4)}50%{box-shadow:0 0 0 15px rgba(244,67,54,0)}}
.btn-reset{width:44px;height:44px;border-radius:50%;border:none;background:#fff;color:#999;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.btn-reset:active{transform:scale(.9)}

/* Bottom spacer for fixed mic area */
.bottom-spacer{height:120px}

/* Splash */
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:40px 20px;text-align:center}
.splash h2{font-size:22px;margin-bottom:8px;color:#333}
.splash p{font-size:14px;color:#666;margin-bottom:24px;line-height:1.6}
.lesson-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:320px;margin-bottom:20px}
.lesson-card{background:#fff;border-radius:16px;padding:18px 12px;box-shadow:0 2px 10px rgba(0,0,0,.08);cursor:pointer;transition:all .2s;border:2px solid transparent}
.lesson-card:active{transform:scale(.96)}
.lesson-card:hover{border-color:#c084fc}
.lesson-card .num{font-size:28px;font-weight:bold;background:linear-gradient(135deg,#ff6b9d,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lesson-card .desc{font-size:12px;color:#888;margin-top:4px}
</style>
</head>
<body>

<div class="header" id="headerBar" style="display:none">

<!-- Splash Screen -->
<div id="splash" class="splash">
  <div class="face" style="width:120px;height:120px;margin-bottom:24px">
    <div class="eye eye-left" style="top:40px;left:30px;width:16px;height:20px"><div class="eye-shine" style="width:6px;height:6px"></div></div>
    <div class="eye eye-right" style="top:40px;right:30px;width:16px;height:20px"><div class="eye-shine" style="width:6px;height:6px"></div></div>
    <div class="blush blush-left" style="top:58px;left:16px;width:18px;height:12px"></div>
    <div class="blush blush-right" style="top:58px;right:16px;width:18px;height:12px"></div>
    <div class="mouth smile" style="bottom:28px;width:28px"></div>
  </div>
  <h2>にほんご かいわ れんしゅう</h2>
  <p>みんなの にほんご<br>かいわを れんしゅう しましょう！</p>
  <div class="lesson-grid">
    <div class="lesson-card" onclick="startLesson(1)">
      <div class="num">1</div>
      <div class="desc">じこしょうかい</div>
    </div>
    <div class="lesson-card" onclick="startLesson(2)">
      <div class="num">2</div>
      <div class="desc">これ・それ・あれ</div>
    </div>
    <div class="lesson-card" onclick="startLesson(3)">
      <div class="num">3</div>
      <div class="desc">ここ・そこ・あそこ</div>
    </div>
    <div class="lesson-card" onclick="startLesson(4)">
      <div class="num">4</div>
      <div class="desc">〜ます・じかん</div>

</div>

<script>
// ===== Configuration =====
// デプロイ後、Cloudflare WorkerのURLに変更してください
const API_BASE = 'https://nihongo-kaiwa-api.kabuyt.workers.dev';

// ===== State =====
const ttsVoice = 'nova';
let currentLesson = 1;
let conversationHistory = [];
let isRecording = false;
let recognition = null;
let currentAudio = null;
let blinkInterval = null;

// ===== Lesson Prompts =====
const lessonPrompts = {
  1: `あなたは日本語の先生「はな」です。A1レベルの学習者と会話練習をしています。

【使える文法】第1課だけ：
- 〜は 〜です（わたしは がくせいです）
- 〜じゃ ありません（せんせいじゃ ありません）
- 〜ですか（がくせいですか？）
- はい、そうです / いいえ、ちがいます
- 〜も 〜です（わたしも がくせいです）
- 〜の 〜（にほんの だいがく）※所属だけ

【使える語彙】
- あいさつ：こんにちは、はじめまして、どうぞよろしく
- 人：わたし、あなた、〜さん、せんせい、がくせい、かいしゃいん、いしゃ、エンジニア
- 国：にほん、ちゅうごく、かんこく、アメリカ、ブラジル、インドなど
- 数字：0〜10、〜さい（年齢）
- その他：なまえ、おくに、おしごと、なんさい、だれ、はい、いいえ

【禁止】以下は絶対に使わないでください：
- 形容詞（すき、おおきい、たかい、いい など）
- 動詞の〜ます形（たべます、いきます など）
- これ/それ/あれ
- ここ/そこ/あそこ
- 第2課以降のすべての文法と語彙
- 「なにがすきですか」「どこにいきますか」のような文

【ルール】
- 短い文で話す（1〜2文）
- 漢字は使わない（ひらがな・カタカナのみ）
- 学習者の間違いはやさしく直す
- 名前、国、しごと、年齢だけを話題にする

最初のあいさつ：「こんにちは！わたしは はなです。おなまえは？」`,

  2: `あなたは日本語の先生「はな」です。A1レベルの学習者と会話練習をしています。

【使える文法】第1〜2課：
- 第1課：〜は〜です、〜ですか、〜も〜です
- 第2課：これ/それ/あれ は 〜です、この/その/あの 〜、〜の〜（所有：わたしのほん）、〜は なんですか

【使える語彙】第1〜2課のみ：
- 第1課の語彙すべて
- もの：ほん、ざっし、じしょ、ノート、てちょう、かぎ、とけい、かさ、かばん、えんぴつ、ボールペン、テレホンカード、めいし
- ことば：これ、それ、あれ、この、その、あの、なん（なに）、だれの、〜の（所有）、そうですか、ちがいます

【禁止】以下は絶対に使わないでください：
- 形容詞（すき、おおきい、たかい、いい など）
- 動詞の〜ます形（たべます、いきます など）
- ここ/そこ/あそこ（場所の指示語）
- 第3課以降のすべての文法と語彙

【ルール】
- 短い文で話す（1〜2文）
- 漢字は使わない
- 学習者の間違いはやさしく直す
- もちものや身の回りのものを話題にする

最初のあいさつ：「こんにちは！あ、それは なんですか？」`,

  3: `あなたは日本語の先生「はな」です。A1レベルの学習者と会話練習をしています。

【使える文法】第1〜3課：
- 第1〜2課：〜は〜です、これ/それ/あれ、この/その/あの
- 第3課：ここ/そこ/あそこ は 〜です、〜は どこですか、〜は 〜かいです（階）、〜えんです（値段）、〜の くに（国の名前）

【使える語彙】第1〜3課のみ：
- 第1〜2課の語彙すべて
- 場所：ここ、そこ、あそこ、どこ、トイレ、かいだん、エレベーター、エスカレーター、じむしょ、しょくどう、うけつけ、ロビー、へや、うりば、ちかいっかい（B1）
- 店：デパート、スーパー、ぎんこう、ゆうびんきょく、としょかん、びょういん
- 数字：ひゃく、せん、まん（値段）、〜かい（階）
- その他：どこの〜（どこのくつですか）、〜えん、いらっしゃいませ

【禁止】以下は絶対に使わないでください：
- 動詞の〜ます形（たべます、いきます など）
- 形容詞（すき、おおきい、たかい、いい など）
- 時間の表現（なんじ、〜じ、〜から〜まで）
- 第4課以降のすべての文法と語彙

【ルール】
- 短い文で話す（1〜2文）
- 漢字は使わない
- 学習者の間違いはやさしく直す
- 場所、建物、値段を話題にする

最初のあいさつ：「こんにちは！ここは がっこうですね。としょかんは どこですか？」`,

  4: `あなたは日本語の先生「はな」です。A1レベルの学習者と会話練習をしています。

【使える文法】第1〜4課：
- 第1〜3課：〜は〜です、これ/それ/あれ、ここ/そこ/あそこ
- 第4課：〜ます / 〜ません / 〜ますか、なんじに 〜ますか、〜じ 〜ふんに、〜から 〜まで、〜と いっしょに、〜で（手段：でんわで）

【使える語彙】第1〜4課のみ：
- 第1〜3課の語彙すべて
- 動詞（ます形のみ）：おきます、ねます、はたらきます、やすみます、べんきょうします、おわります、はじまります
- 時間：なんじ、〜じ、〜ふん、ごぜん、ごご、あさ、ひる、ばん、よる
- 曜日：げつようび〜にちようび
- その他：まいにち、まいあさ、まいばん、いつ、それから、つぎに、たいへんですね
- 場所：うち、がっこう、かいしゃ

【禁止】以下は絶対に使わないでください：
- 形容詞（すき、おおきい、たかい、いい など）
- 〜ましょう（誘い）
- 〜たいです（希望）
- 〜ています（進行形）
- いきます、きます、かえります（第5課の動詞）
- 第5課以降のすべての文法と語彙

【ルール】
- 短い文で話す（1〜2文）
- 漢字は使わない
- 学習者の間違いはやさしく直す
- まいにちのスケジュール、時間を話題にする

最初のあいさつ：「こんにちは！まいにち なんじに おきますか？」`
};

// ===== Init =====
function init() {
  initSpeechRecognition();
}

function startLesson(num) {
  currentLesson = num;
  document.getElementById('lessonSelect').value = num;
  document.getElementById('splash').style.display = 'none';
  document.getElementById('headerBar').style.display = 'block';
  document.getElementById('appMain').style.display = 'block';
  startBlink();
  activateAudio(); // Pre-activate audio on user gesture for iOS
  startNewConversation();
}

function saveVoice() {
  ttsVoice = document.getElementById('voiceSelect').value;
  localStorage.setItem('tts_voice', ttsVoice);
}

// ===== Lesson =====
function changeLesson() {
  currentLesson = parseInt(document.getElementById('lessonSelect').value);
  resetChat();
}

function startNewConversation() {
  conversationHistory = [
    { role: 'system', content: lessonPrompts[currentLesson] }
  ];
  callChatAPI();
}

function resetChat() {
  if (currentAudio) { try { currentAudio.pause(); currentAudio.currentTime = 0; } catch(e) {} currentAudio = null; }
  document.getElementById('bubbleArea').innerHTML = '';
  setFaceState('idle');
  startNewConversation();
}

// ===== Face Animation =====
function setFaceState(state) {
  const mouth = document.getElementById('mouth');
  const eyeL = document.getElementById('eyeL');
  const eyeR = document.getElementById('eyeR');

  mouth.className = 'mouth';
  eyeL.className = 'eye eye-left';
  eyeR.className = 'eye eye-right';

  switch(state) {
    case 'speaking':
      mouth.classList.add('speaking');
      break;
    case 'listening':
      mouth.classList.add('smile');
      eyeL.classList.add('listening');
      eyeR.classList.add('listening');
      break;
    case 'thinking':
      mouth.classList.add('thinking');
      eyeL.classList.add('thinking');
      eyeR.classList.add('thinking');
      break;
    case 'idle':
    default:
      mouth.classList.add('smile');
      break;
  }
}

function startBlink() {
  if (blinkInterval) clearInterval(blinkInterval);
  blinkInterval = setInterval(() => {
    const mouth = document.getElementById('mouth');
    if (mouth.classList.contains('speaking') || mouth.classList.contains('thinking')) return;
    const eyeL = document.getElementById('eyeL');
    const eyeR = document.getElementById('eyeR');
    eyeL.classList.add('blink');
    eyeR.classList.add('blink');
    setTimeout(() => {
      eyeL.classList.remove('blink');
      eyeR.classList.remove('blink');
    }, 150);
  }, 3000 + Math.random() * 2000);
}

// ===== Speech Recognition =====
// Web Speech API (Chrome/Edge) or MediaRecorder + Whisper fallback (Safari/iOS)
let useWhisperFallback = false;
let mediaRecorder = null;
let audioChunks = [];

function initSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.interimResults = false;
    recognition.continuous = false;

    recognition.onresult = (e) => {
      const text = e.results[0][0].transcript;
      handleUserSpeech(text);
    };

    recognition.onerror = (e) => {
      console.error('Speech error:', e.error);
      if (e.error === 'no-speech') {
        setStatus('こえが きこえませんでした');
      } else if (e.error === 'not-allowed') {
        setStatus('マイクを ゆるしてください');
      }
      stopRecording();
    };

    recognition.onend = () => {
      stopRecording();
    };
  } else {
    // Safari/iOS fallback: use MediaRecorder + Whisper API
    useWhisperFallback = true;
  }
}

function handleUserSpeech(text) {
  addBubble(text, 'user');
  setFaceState('thinking');
  setStatus('かんがえています...');
  conversationHistory.push({ role: 'user', content: text });
  callChatAPI();
}

function toggleMic() {
  if (isRecording) {
    if (useWhisperFallback && mediaRecorder) {
      mediaRecorder.stop();
    } else if (recognition) {
      recognition.stop();
    }
    return;
  }

  if (currentAudio) { try { currentAudio.pause(); currentAudio.currentTime = 0; } catch(e) {} currentAudio = null; }
  activateAudio(); // Pre-activate audio on user gesture for iOS
  setFaceState('listening');
  setStatus('きいています... 🎧');
  isRecording = true;
  document.getElementById('btnMic').classList.add('recording');

  if (useWhisperFallback) {
    startWhisperRecording();
  } else if (recognition) {
    try {
      recognition.start();
    } catch(err) {
      console.error('Recognition start error:', err);
      setStatus('マイクエラー。テキストで にゅうりょく してください。');
      stopRecording();
    }
  } else {
    setStatus('テキストで にゅうりょく してください');
    stopRecording();
  }
}

function startWhisperRecording() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    audioChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    mediaRecorder = new MediaRecorder(stream, { mimeType });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      stopRecording();
      if (audioChunks.length === 0) return;
      setFaceState('thinking');
      setStatus('ききとっています...');
      const blob = new Blob(audioChunks, { type: mimeType });
      whisperTranscribe(blob).then(text => {
        if (text) handleUserSpeech(text);
        else { setStatus('こえが きこえませんでした'); setFaceState('idle'); }
      }).catch(err => {
        console.error('Whisper error:', err);
        setStatus('エラー: ' + err.message);
        setFaceState('idle');
      });
    };
    mediaRecorder.start();
  }).catch(err => {
    console.error('Mic access error:', err);
    setStatus('マイクを ゆるしてください');
    stopRecording();
  });
}

function sendText() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  if (currentAudio) { try { currentAudio.pause(); currentAudio.currentTime = 0; } catch(e) {} currentAudio = null; }
  activateAudio(); // Pre-activate audio on user gesture for iOS
  handleUserSpeech(text);
}

async function whisperTranscribe(blob) {
  const formData = new FormData();
  const ext = blob.type.includes('webm') ? 'webm' : 'm4a';
  formData.append('file', blob, `audio.${ext}`);
  const res = await fetch(API_BASE + '/api/whisper', {
    method: 'POST',
    body: formData
  });
  if (!res.ok) throw new Error(`Whisper error: ${res.status}`);
  const data = await res.json();
  return data.text;
}

function stopRecording() {
  isRecording = false;
  document.getElementById('btnMic').classList.remove('recording');
}

// ===== Chat API (via Cloudflare Worker) =====
async function callChatAPI() {
  setFaceState('thinking');
  setStatus('かんがえています...');

  try {
    const res = await fetch(API_BASE + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `API error: ${res.status}`);
    }

    const data = await res.json();
    const reply = data.choices[0].message.content.trim();
    conversationHistory.push({ role: 'assistant', content: reply });
    addBubble(reply, 'ai');
    // Start TTS but don't await — let it play in background
    // so the UI stays responsive for next input
    speakText(reply);
  } catch(err) {
    console.error('Chat API error:', err);
    setStatus('エラー: ' + err.message);
    setFaceState('idle');
    addBubble('ごめんなさい、エラーが おきました 😢', 'ai');
  }
}

// ===== TTS API (via Cloudflare Worker) =====
// iOS blocks audio.play() unless triggered directly by user gesture.
// Strategy: On user tap (send/mic), immediately play() a silent audio to
// "activate" the element. Then when TTS arrives, swap src and play() again.
// iOS allows subsequent play() on an already-activated element.
const ttsAudio = document.getElementById('ttsAudio');
let lastBlobUrl = null;
// Tiny silent MP3 (< 100 bytes) for iOS activation
const SILENCE = 'data:audio/mp3;base64,//uQxAAAAAANIAAAAAExBTUUzLjEwMFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//uQxBEAAADSAAAAAFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV';
let ttsResolve = null;

// Called from user gesture handlers to pre-activate audio
function activateAudio() {
  ttsAudio.src = SILENCE;
  ttsAudio.loop = true;
  ttsAudio.volume = 0.01;
  const p = ttsAudio.play();
  if (p) p.catch(() => {});
}

async function speakText(text) {
  setFaceState('speaking');
  setStatus('はなしています...');

  try {
    const res = await fetch(API_BASE + '/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input: text, voice: ttsVoice })
    });

    if (!res.ok) throw new Error(`TTS error: ${res.status}`);

    const blob = await res.blob();
    if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
    lastBlobUrl = URL.createObjectURL(blob);

    // Stop the silent loop and swap to real audio
    ttsAudio.pause();
    ttsAudio.loop = false;
    ttsAudio.volume = 1.0;
    ttsAudio.src = lastBlobUrl;
    currentAudio = ttsAudio;

    ttsAudio.onended = () => {
      setFaceState('idle');
      setStatus('🎤 ボタンを おして はなしてください');
      currentAudio = null;
    };

    ttsAudio.onerror = () => {
      console.error('TTS audio error');
      setFaceState('idle');
      setStatus('🎤 ボタンを おして はなしてください');
      currentAudio = null;
    };

    try {
      await ttsAudio.play();
    } catch(playErr) {
      // iOS may block play() — silently fail, text is already shown
      console.warn('Audio play blocked:', playErr.message);
      setFaceState('idle');
      setStatus('🎤 ボタンを おして はなしてください');
      currentAudio = null;
    }
  } catch(err) {
    console.error('TTS error:', err);
    setFaceState('idle');
    setStatus('🎤 ボタンを おして はなしてください');
  }
}

// ===== UI Helpers =====
function addBubble(text, type) {
  const area = document.getElementById('bubbleArea');
  const div = document.createElement('div');
  div.className = `bubble ${type}`;
  div.textContent = text;
  area.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function setStatus(text) {
  document.getElementById('statusText').textContent = text;
}

// ===== Start =====
init();
</script>
